<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Guga Energy | Página em Atualização</title>

<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:20px;

background:
linear-gradient(
180deg,
rgba(0,0,0,.84),
rgba(0,0,0,.92)
),
url("hero-eletricista.jpg");

background-size:cover;
background-position:center;

color:#fff;

overflow:hidden;
}

.container{
width:100%;
max-width:720px;

padding:55px 40px;

background:rgba(12,12,12,.76);

border:1px solid rgba(255,255,255,.06);

border-radius:28px;

backdrop-filter:blur(10px);

box-shadow:
0 20px 60px rgba(0,0,0,.55);

text-align:center;
}

.logo{
font-size:68px;
font-weight:800;
line-height:.9;
letter-spacing:-3px;

margin-bottom:25px;
}

.logo span{
color:#FFD000;

text-shadow:
0 0 18px rgba(255,208,0,.25);
}

h1{
font-size:38px;
font-weight:800;

margin-bottom:18px;

line-height:1.1;
}

p{
font-size:16px;
line-height:1.8;

color:#cfcfcf;

margin-bottom:35px;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);

gap:14px;

margin-bottom:35px;
}

.card{
background:#121212;

border:1px solid rgba(255,255,255,.06);

padding:20px;

border-radius:16px;

font-size:14px;
font-weight:600;

color:#ddd;

transition:.25s;
}

.card:hover{
transform:translateY(-3px);

border-color:rgba(255,208,0,.2);

background:#171717;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;

padding:16px 32px;

background:#FFD000;
color:#000;

font-size:14px;
font-weight:700;

text-decoration:none;

border-radius:60px;

transition:.25s;
}

.btn:hover{
background:#fff;
transform:translateY(-3px);
}

@media(max-width:768px){

.container{
padding:40px 25px;
}

.logo{
font-size:48px;
}

h1{
font-size:30px;
}

p{
font-size:15px;
}

.cards{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
GUGA <span>ENERGY</span>
</div>

<h1>
Página em atualização
</h1>

<p>
Estamos finalizando esta página com novos conteúdos, imagens reais de serviços executados e informações técnicas sobre nossas soluções elétricas.
</p>

<div class="cards">

<div class="card">
⚡ Instalações elétricas
</div>

<div class="card">
💡 Iluminação e perfil LED
</div>

<div class="card">
📹 Segurança eletrônica
</div>

<div class="card">
🔧 Manutenção elétrica
</div>

</div>

<a class="btn" href="index.html">
Voltar ao site
</a>

</div>

</body>

</html>
