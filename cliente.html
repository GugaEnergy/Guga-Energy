<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Área do Cliente | Guga Energy</title>

<link rel="icon" href="favicon.png">

<style>

/* RESET ESSENCIAL */
*{
box-sizing:border-box;
}

img{
max-width:100%;
height:auto;
}

.sair{
background:#FFD000;
border:none;
padding:10px 16px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
transition:0.2s;

margin-left:auto;   /* joga pra direita */
margin-right:55px;  /* afasta da borda */
min-width:90px;     /* tamanho padrão */
text-align:center;
}

.sair:hover{
opacity:0.85;
}

/* BASE */

body{
font-family:Arial, Helvetica, sans-serif;
background:#020202;
color:#fff;
margin:0;
padding-top:110px;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:110px;
background:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:3px solid #FFD000;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:95px;
}

.logo span{
color:#FFD000;
}

/* NÃO MEXI NO SEU .SAIR */

/* CONTAINER */

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* CARDS */

.card{
background:#111;
border-left:4px solid #FFD000;
padding:22px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.4);
transition:.2s;
}

.card:hover{
transform:translateY(-2px);
}

.card h3{
margin-bottom:15px;
color:#FFD000;
font-size:18px;
}

.card p{
display:flex;
justify-content:space-between;
border-bottom:1px solid #222;
padding:8px 0;
font-size:14px;
}

/* BOTÕES */

.btns{
margin-top:15px;
display:flex;
gap:10px;
}

.btn{
flex:1;
text-align:center;
background:#FFD000;
color:#000;
padding:12px;
border-radius:6px;
font-weight:bold;
text-decoration:none;
min-height:44px; /* toque profissional */
display:flex;
align-items:center;
justify-content:center;
}

/* LISTAS */

.servico, .nota{
background:#151515;
padding:14px;
margin-bottom:10px;
border-radius:8px;
border-left:3px solid #FFD000;
}

/* ========================= */
/* RESPONSIVO PROFISSIONAL */
/* ========================= */

@media(max-width:600px){

header{
height:65px;
padding:0 12px;
}

body{
padding-top:65px;
}

.logo img{
height:40px;
}

.logo h2{
font-size:16px;
}

/* quebra layout dos dados */
.card p{
flex-direction:column;
align-items:flex-start;
gap:3px;
font-size:13px;
}

/* botões empilhados */
.btns{
flex-direction:column;
}

.container{
padding:15px;
}

.card{
padding:16px;
}

}

/* TABLET */

@media(min-width:601px) and (max-width:1024px){

.container{
padding:18px;
}

}

/* TELAS GRANDES */

@media(min-width:1200px){

.container{
max-width:1100px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="/logo-guga-energy.png">
<h2>GUGA <span>ENERGY</span></h2>
</div>

<button class="sair" onclick="sair()">Sair</button>

</header>

<div class="container">

<!-- DADOS -->

<div class="card">

<h3>Dados do Cliente</h3>

<p><strong>Nome:</strong> <span id="nome">...</span></p>
<p><strong>Endereço:</strong> <span id="endereco">...</span></p>
<p><strong>Telefone:</strong> <span id="telefone">...</span></p>

<div class="btns">
<a id="btnWhats" class="btn">WhatsApp</a>
<a id="btnLigar" class="btn">Ligar</a>
</div>

</div>

<!-- SERVIÇOS -->

<div class="card">

<h3>Histórico de Serviços</h3>

<div id="servicos">Carregando...</div>

</div>

<!-- NOTAS -->

<div class="card">

<h3>Notas Técnicas</h3>

<div id="notas">Carregando...</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"
import {
getFirestore,
doc,
getDoc,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"
import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js"

const firebaseConfig = {
apiKey:"AIzaSyDdP2-_Dr67CVhaNmgrs8x0JvTan2f9mNc",
authDomain:"guga-energy-agendamentos-778f1.firebaseapp.com",
projectId:"guga-energy-agendamentos-778f1"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)
const auth = getAuth(app)

/* LOGIN */

onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html"
return
}

/* DADOS */

const docRef = doc(db,"usuarios",user.uid)
const docSnap = await getDoc(docRef)

let telefoneLimpo = ""

if(docSnap.exists()){

const dados = docSnap.data()

document.getElementById("nome").innerText = dados.nome || "-"
document.getElementById("endereco").innerText = dados.endereco || "-"
document.getElementById("telefone").innerText = dados.telefone || "-"

telefoneLimpo = (dados.telefone || "").replace(/\D/g,"")

}

/* BOTÕES */

document.getElementById("btnWhats").href = `https://wa.me/55${telefoneLimpo}`
document.getElementById("btnLigar").href = `tel:${telefoneLimpo}`

/* SERVIÇOS */

const servicosRef = collection(db,"clientes",user.uid,"servicos")
const servicosSnap = await getDocs(servicosRef)

let htmlServicos = ""

servicosSnap.forEach(doc=>{
const s = doc.data()

htmlServicos += `
<div class="servico">
<strong>${s.titulo || "Serviço"}</strong><br>
${s.descricao || ""}
</div>
`
})

if(htmlServicos === ""){
htmlServicos = "<p>Nenhum serviço registrado</p>"
}

document.getElementById("servicos").innerHTML = htmlServicos

/* NOTAS */

const notasRef = collection(db,"clientes",user.uid,"notas")
const notasSnap = await getDocs(notasRef)

let htmlNotas = ""

notasSnap.forEach(doc=>{
const n = doc.data()

htmlNotas += `
<div class="nota">
${n.texto || ""}
</div>
`
})

if(htmlNotas === ""){
htmlNotas = "<p>Nenhuma nota técnica</p>"
}

document.getElementById("notas").innerHTML = htmlNotas

})

/* SAIR */

window.sair = async function(){
await signOut(auth)
window.location.href="index.html"
}

</script>

</body>
</html>
