<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Completar Perfil</title>

<style>

body{
background:#020202;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#0a0a0a;
padding:30px;
width:350px;
border-top:3px solid #FFD000;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
background:#111;
color:white;
}

button{
width:100%;
padding:10px;
background:#FFD000;
border:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>Completar Cadastro</h2>

<input id="nome" placeholder="Nome completo">
<input id="telefone" placeholder="Telefone">
<input id="endereco" placeholder="Endereço">

<button onclick="salvar()">Salvar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"
import { getAuth } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js"
import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"

const firebaseConfig = {

apiKey:"AIzaSyDdP2-_Dr67CVhaNmgrs8x0JvTan2f9mNc",
authDomain:"guga-energy-agendamentos-778f1.firebaseapp.com",
projectId:"guga-energy-agendamentos-778f1"

}

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)

window.salvar = async function(){

const user = auth.currentUser

const nome = document.getElementById("nome").value
const telefone = document.getElementById("telefone").value
const endereco = document.getElementById("endereco").value

await updateDoc(doc(db,"usuarios",user.uid),{

nome,
telefone,
endereco,
perfilCompleto:true

})

window.location.href="painel-cliente.html"

}

</script>

</body>
</html>
