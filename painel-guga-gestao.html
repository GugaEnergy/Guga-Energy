<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Guga Energy</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020202;
color:#fff;
padding-top:90px;
}

/* HEADER */

header{
background:#000;
padding:12px 20px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:3px solid #FFD000;
position:fixed;
top:0;
left:0;
width:100%;
z-index:3000;
box-sizing:border-box;
}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:#fff;
}

.logo img{
height:50px;
}

.logo h2{
font-size:22px;
margin:0;
}

.logo span{
color:#FFD000;
}

/* BOTÃO SAIR */

.sair-btn{
background:#FFD000;
color:#000;
border:none;
border-radius:4px;
padding:8px 16px;
font-weight:bold;
cursor:pointer;
font-size:13px;
}

.sair-btn:hover{
background:#ffe44d;
}

/* BOTÕES GERAIS */

.btn{
background:#FFD000;
color:#000;
border:none;
border-radius:4px;
padding:8px 12px;
font-weight:bold;
cursor:pointer;
font-size:13px;
min-width:90px;
}

.btn.verde{
background:#28a745;
color:#fff;
}

.btn.vermelho{
background:#dc3545;
color:#fff;
}

/* LOGIN */

.login{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
background:#020202;
}

.login-box{
background:rgba(8,8,8,0.92);
padding:40px;
border-radius:12px;
width:340px;
max-width:90%;
text-align:center;
border:1px solid #1a1a1a;
border-top:3px solid #FFD000;
box-shadow:0 10px 40px rgba(0,0,0,0.9);
}

.login-box input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:5px;
border:1px solid #1f1f1f;
background:#111;
color:white;
font-size:14px;
}

.login-box button{
width:100%;
padding:12px;
margin-top:10px;
background:#FFD000;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

/* SUBTEXTO LOGIN */

.login-sub{
font-size:13px;
color:#9c9c9c;
margin-bottom:20px;
}

/* CAMPOS */

.usuario-box,
.senha-box{
position:relative;
width:92%;
}

/* INPUTS */

.login-box input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:5px;
border:1px solid #1f1f1f;
background:#111;
color:white;
font-size:14px;
outline:none;
}

/* OLHO DA SENHA */

.ver-senha{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#FFD000;
font-size:18px;
}

/* PAINEL */

.painel{
display:none;
padding:30px;
max-width:1200px;
margin:auto;
}

/* CONTAINER DOS CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
margin-bottom:30px;
}

/* CARD */

.card{
background:#151515;
padding:28px;
border-left:4px solid #FFD000;
border-radius:8px;
display:flex;
flex-direction:column;
gap:8px;
box-shadow:0 8px 25px rgba(0,0,0,0.6);
transition:all .3s ease;
cursor:pointer;
}

.card:hover{
transform:translateY(-6px);
background:#1c1c1c;
box-shadow:0 14px 35px rgba(0,0,0,0.8);
}
.card::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:0%;
height:2px;
background:#FFD000;
transition:.3s;
}

.card:hover::after{
width:100%;
}

.card strong{
color:#FFD000;
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
background:#111;
border-radius:6px;
overflow:hidden;
}

th{
background:#000;
color:#FFD000;
}

th,td{
padding:14px;
border-bottom:1px solid #333;
font-size:14px;
}

/* AÇÕES */

.acoes{
display:flex;
gap:6px;
flex-wrap:wrap;
}

/* CONTADOR */

.contador-atendimentos{
margin:20px 0;
font-size:16px;
background:#111;
padding:12px 15px;
border-left:4px solid #FFD000;
border-radius:4px;
}

.contador-atendimentos strong{
color:#FFD000;
}

/* RESPONSIVO */

@media(max-width:900px){

table{
display:block;
overflow-x:auto;
white-space:nowrap;
}

}

@media(max-width:600px){

.logo img{
height:40px;
}

.logo h2{
font-size:18px;
}

.sair-btn{
right:15px;
padding:7px 12px;
font-size:12px;
}

}

.empresa-nome{
font-size:18px;
font-weight:bold;
color:#fff;
}

.empresa-nome span{
color:#FFD000;
}

.empresa-desc{
font-size:14px;
color:#bdbdbd;
}

@media(max-width:768px){

table,
thead,
tbody,
th,
td,
tr{
display:block;
width:100%;
}

thead{
display:none;
}

tr{
background:#111;
border-radius:10px;
margin-bottom:20px;
padding:16px;
border-left:4px solid #FFD000;
box-shadow:0 6px 18px rgba(0,0,0,0.6);
}

td{
border:none;
padding:8px 0;
font-size:14px;
display:flex;
flex-direction:column;
gap:3px;
}

td::before{
font-weight:bold;
color:#FFD000;
font-size:12px;
opacity:0.8;
}

td:nth-child(6){
line-height:1.4;
color:#ddd;
}

/* nomes das colunas */

td:nth-child(1)::before{content:"Cliente";}
td:nth-child(2)::before{content:"Telefone";}
td:nth-child(3)::before{content:"Região";}
td:nth-child(4)::before{content:"Data";}
td:nth-child(5)::before{content:"Status";}
td:nth-child(6)::before{content:"Problema";}
td:nth-child(7)::before{content:"Ações";}

.acoes{
margin-top:8px;
flex-wrap:wrap;
}

.btn{
flex:1;
min-width:80px;
}
}

@media(max-width:768px){

.acoes{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:12px;
}

.btn{
width:100%;
text-align:center;
}

}

td{
word-break:break-word;
text-align:right;
}

td::before{
text-align:left;
}

.busca-box{
margin-bottom:15px;
}

#buscaCliente{
width:100%;
padding:12px;
border-radius:6px;
border:none;
background:#111;
color:white;
font-size:14px;
outline:none;
}

#buscaCliente::placeholder{
color:#888;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-bottom:25px;
}

.dash-card{
background:#111;
padding:15px;
border-left:4px solid #FFD000;
border-radius:6px;
text-align:center;
}

.dash-card span{
font-size:12px;
color:#aaa;
}

.dash-card strong{
display:block;
font-size:22px;
color:#FFD000;
margin-top:5px;
}

</style>

</head>

<body>

<!-- aqui vem sua lista de agendamentos -->

<script>
function sair(){
localStorage.removeItem("adminLogado")
window.location.href="/"
}
</script>

<div id="menu-overlay"></div>

<!-- TOPO -->
 
<header id="topo" style="display:none">

<a href="#" class="logo" onclick="window.location.reload()">
<img src="logo.png">
<h2>GUGA <span>ENERGY</span></h2>
</a>

<button onclick="sair()" class="sair-btn">
Sair
</button>

</header>

<!-- LOGIN -->

<div class="login" id="login">

<div class="login-box">

<div class="logo">
<img src="logo.png" alt="Guga Energy">
<span>Guga Energy</span>
</div>

<div class="login-sub">
Painel de Atendimentos
</div>

<div class="usuario-box">
<input id="usuario" placeholder="Usuário">
</div>
<div class="senha-box">
<input id="senha" type="password" placeholder="Senha">
<span class="ver-senha" onclick="verSenha()">👁</span>
</div>

<button onclick="carregar()" class="btn">Atualizar</button>
<button onclick="entrar()" class="btn">Entrar no Painel</button>
<button onclick="voltarSite()" class="btn">Sair</button>

</div>

</div>

<!-- PAINEL -->

<div class="painel" id="painel">

<div class="cards">

<div class="card">
<strong>Empresa</strong>
<div class="empresa-nome">GUGA <span>ENERGY</span></div>
<div class="empresa-desc">Soluções Elétricas</div>
</div>

<div class="card">
<strong>Região de Atendimento</strong>
<div class="empresa-desc">Distrito Federal</div>
</div>

</div>

<div class="busca-box">

<input 
type="text" 
id="buscaCliente" 
placeholder="🔎 Buscar cliente ou telefone"
>
</div>

<div class="dashboard">

<div class="dash-card">
<span>Pendentes</span>
<strong id="pendentes">0</strong>
</div>

<div class="dash-card">
<span>Concluídos</span>
<strong id="concluidos">0</strong>
</div>

<div class="dash-card">
<span>Arquivados</span>
<strong id="arquivados">0</strong>
</div>

<div class="dash-card">
<span>Hoje</span>
<strong id="hoje">0</strong>
</div>

</div>

<div class="contador-atendimentos">

Atendimentos registrados: 
<strong id="total">0</strong>

</div>

<table>

<thead>
<tr>
<th>Cliente</th>
<th>Telefone</th>
<th>Região</th>
<th>Data</th>
<th>Status</th>
<th>Problema</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"
import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc } from
"https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"
window.deleteDoc = deleteDoc
window.updateDoc = updateDoc
window.doc = doc

const firebaseConfig = {

apiKey: "AIzaSyDdP2-_Dr67CVhaNmgrs8x0JvTan2f9mNc",
authDomain: "guga-energy-agendamentos-778f1.firebaseapp.com",
projectId: "guga-energy-agendamentos-778f1",
storageBucket: "guga-energy-agendamentos-778f1.firebasestorage.app",
messagingSenderId: "384265745174",
appId: "1:384265745174:web:a9284d4036f4a787bf5637"

}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

window.db = db
window.getDocs = getDocs
window.collection = collection

</script>

<!-- GOOGLE MAPS -->

<script>

/* LOGIN */

function entrar(){

let user=document.getElementById("usuario").value.trim().toLowerCase()
let pass=document.getElementById("senha").value.trim()

if(user==="guga" && pass==="Energy2024"){

localStorage.setItem("painelLogado","sim")

document.getElementById("login").style.display="none"
document.getElementById("painel").style.display="block"
document.getElementById("topo").style.display="flex"

setTimeout(carregar,200)

}else{

alert("Usuário ou senha incorretos.")

}

}

/* SAIR */

function sair(){

localStorage.removeItem("painelLogado")

document.getElementById("painel").style.display="none"
document.getElementById("topo").style.display="none"
document.getElementById("login").style.display="flex"
document.getElementById("usuario").value=""
document.getElementById("senha").value=""

}

/* CARREGAR DADOS */

async function carregar(){

if(typeof db === "undefined"){
setTimeout(carregar,500)
return
}

let tabela = document.getElementById("tabela")
tabela.innerHTML=""

let total = 0
let pendentes = 0
let concluidos = 0
let arquivados = 0

try{

let snapshot = await getDocs(collection(db,"agendamentos"))

snapshot.forEach(documento=>{

let dados = documento.data()
let id = documento.id

let telefoneLimpo = (dados.telefone || "").replace(/\D/g,'')
let status = dados.status || "Pendente"

/* CONTADORES */

if(status === "Concluído"){
concluidos++
}else{
pendentes++
}

/* FILTRO DE ARQUIVADOS */

if(dados.arquivado){

arquivados++

let trintaDias = 30 * 24 * 60 * 60 * 1000

if(Date.now() - dados.dataArquivado > trintaDias){
deleteDoc(doc(db,"agendamentos",id))
}

return
}

total++

let linha = `
<tr>

<td>${dados.nome}</td>
<td>${dados.telefone}</td>
<td>${dados.regiao}</td>
<td>${dados.dataHora || "-"}</td>
<td>${status}</td>
<td>${dados.problema}</td>

<td>

<div class="acoes">

<a class="btn"
href="https://wa.me/55${telefoneLimpo}"
target="_blank">
WhatsApp
</a>

<a class="btn"
href="tel:${telefoneLimpo}">
Ligar
</a>

<a class="btn"
href="https://www.google.com/maps/search/?api=1&query=${dados.regiao}+Brasilia+DF"
target="_blank">
Mapa
</a>

<button class="btn"
onclick="abrirAgenda('${dados.nome}','${telefoneLimpo}','${dados.regiao}','${dados.problema}','${dados.dataHora}')">
Agenda
</button>

<button class="btn verde"
onclick="concluir('${id}')">
Concluir
</button>

<button class="btn vermelho"
onclick="arquivar('${id}')">
Arquivar
</button>

</div>

</td>

</tr>
`

tabela.innerHTML += linha

})

/* ATUALIZA DASHBOARD */

document.getElementById("total").innerText = total
document.getElementById("pendentes").innerText = pendentes
document.getElementById("concluidos").innerText = concluidos
document.getElementById("arquivados").innerText = arquivados
document.getElementById("hoje").innerText = total

}catch(e){

alert("Erro ao carregar agendamentos.")
console.log(e)

}

}

/* GOOGLE AGENDA */

function abrirAgenda(nome, telefone, regiao, problema, dataHora){

if(!dataHora) return
let partes = dataHora.split(" às ")

let data = partes[0]
let hora = partes[1]

let [dia,mes,ano] = data.split("/")
let inicio = `${ano}-${mes}-${dia}T${hora}`

let fim = new Date(inicio)
fim.setHours(fim.getHours()+1)

let inicioFormatado = inicio.replace(/[-:]/g,"")
let fimFormatado = fim.toISOString().replace(/[-:]/g,"").split(".")[0]

let agenda = "https://calendar.google.com/calendar/render?action=TEMPLATE"
+ "&text=Visita Técnica - " + nome
+ "&details=Cliente: " + nome + " | Telefone: " + telefone + " | Problema: " + problema
+ "&location=" + regiao
+ "&dates=" + inicioFormatado + "/" + fimFormatado

window.open(agenda)

}

function voltarSite(){

window.location.href="index.html"

}

function verSenha(){

let campo = document.getElementById("senha")

if(campo.type === "password"){
campo.type = "text"
}else{
campo.type = "password"
}

}

async function concluir(id){

if(!id) return

try{

await updateDoc(doc(db,"agendamentos",id),{
status:"Concluído"
})

carregar()

}catch(e){

console.log(e)
alert("Erro ao concluir atendimento.")

}

}

async function excluir(id){

if(!confirm("Deseja realmente excluir este agendamento?")) return

try{

await deleteDoc(doc(db,"agendamentos",id))

carregar()

}catch(e){

alert("Erro ao excluir atendimento.")
console.log(e)

}

}

window.addEventListener("load", function(){

if(localStorage.getItem("painelLogado")==="sim"){

document.getElementById("login").style.display="none"
document.getElementById("painel").style.display="block"
document.getElementById("topo").style.display="flex"

carregar()

}

})

async function arquivar(id){

if(!confirm("Mover atendimento para lixeira por 30 dias?")) return

try{

await updateDoc(doc(db,"agendamentos",id),{
arquivado:true,
dataArquivado:Date.now()
})

carregar()

}catch(e){

alert("Erro ao arquivar atendimento.")
console.log(e)

}

}

document.getElementById("buscaCliente").addEventListener("keyup", function(){

let filtro = this.value.toLowerCase()

let linhas = document.querySelectorAll("#tabela tr")

linhas.forEach(function(linha){

let texto = linha.innerText.toLowerCase()

if(texto.includes(filtro)){
linha.style.display = ""
}else{
linha.style.display = "none"
}

})

})

</script>

</body>
</html>
