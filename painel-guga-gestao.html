<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Guga Energy</title>

<style>

/* RESET */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* BASE */

body{
font-family:Arial, Helvetica, sans-serif;
background:#020202;
color:#fff;
padding-top:70px;
min-height:100vh;
}

/* HEADER */

header{
background:#000;
height:70px;
padding:0 18px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:3px solid #FFD000;
position:fixed;
top:0;
left:0;
width:100%;
z-index:3000;
}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:8px;
text-decoration:none;
color:#fff;
}

.logo img{
height:40px;
}

.logo h2{
font-size:18px;
}

.logo span{
color:#FFD000;
}

/* BOTÃO SAIR */

.sair-btn{
background:#FFD000;
color:#000;
border:none;
border-radius:6px;
padding:8px 14px;
font-weight:bold;
font-size:13px;
cursor:pointer;
}

/* BOTÕES */

.btn{
display:flex;
align-items:center;
justify-content:center;
background:#FFD000;
color:#000;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.btn:hover{
opacity:.9;
}

.btn.verde{
background:#28a745;
color:#fff;
}

.btn.vermelho{
background:#dc3545;
color:#fff;
}

/* LOGIN */

.login{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
padding:20px;
}

.login-box{
background:#0a0a0a;
padding:30px;
border-radius:12px;
width:340px;
max-width:100%;
text-align:center;
border-top:3px solid #FFD000;
box-shadow:0 10px 40px rgba(0,0,0,0.9);
}

.login-box input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #1f1f1f;
background:#111;
color:#fff;
}

.login-sub{
font-size:13px;
color:#9c9c9c;
margin-bottom:20px;
}

/* PAINEL */

.painel{
display:none;
padding:20px 15px;
max-width:1400px;
margin:auto;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
margin-bottom:20px;
}

.card{
background:#151515;
padding:16px;
border-left:4px solid #FFD000;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.5);
}

.card strong{
color:#FFD000;
}

/* BUSCA */

.busca-box{
margin-bottom:18px;
}

#buscaCliente{
width:100%;
padding:14px;
border-radius:8px;
border:none;
background:#111;
color:#fff;
font-size:15px;
}

/* DASHBOARD */

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-bottom:20px;
}

.dash-card{
background:#111;
padding:12px;
border-left:4px solid #FFD000;
border-radius:8px;
text-align:center;
}

.dash-card strong{
display:block;
font-size:18px;
color:#FFD000;
margin-top:4px;
}

/* CONTADOR */

.contador-atendimentos{
margin:18px 0;
background:#111;
padding:12px;
border-left:4px solid #FFD000;
border-radius:6px;
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
background:#111;
border-radius:6px;
overflow:hidden;
}

th{
background:#000;
color:#FFD000;
}

th,td{
padding:12px;
border-bottom:1px solid #333;
font-size:14px;
word-break:break-word;
}

/* AÇÕES */

.acoes{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
}

.btn{
padding:10px;
font-size:13px;
}

/* SCROLL */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#FFD000;
}

/* ========================= */
/* MOBILE RESPONSIVO */
/* ========================= */

@media(max-width:768px){

/* tabela vira cards */

table,
thead,
tbody,
th,
td,
tr{
display:block;
width:100%;
}

thead{
display:none;
}

tr{
background:#111;
border-radius:12px;
margin-bottom:16px;
padding:16px;
border-left:4px solid #FFD000;
box-shadow:0 4px 14px rgba(0,0,0,0.5);
}

td{
border:none;
padding:6px 0;
display:flex;
flex-direction:column;
gap:4px;
font-size:14px;
}

td::before{
font-weight:bold;
color:#FFD000;
font-size:12px;
opacity:.9;
}

/* nomes das colunas */

td:nth-child(1)::before{content:"Cliente";}
td:nth-child(2)::before{content:"Telefone";}
td:nth-child(3)::before{content:"Região";}
td:nth-child(4)::before{content:"Data";}
td:nth-child(5)::before{content:"Status";}
td:nth-child(6)::before{content:"Problema";}
td:nth-child(7)::before{content:"Ações";}

/* botões maiores */

.btn{
width:100%;
min-height:42px;
font-size:14px;
}

/* ações organizadas */

.acoes{
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:8px;
}

}

/* CELULAR PEQUENO */

@media(max-width:420px){

.dashboard{
grid-template-columns:1fr 1fr;
}

.logo h2{
font-size:16px;
}

.btn{
font-size:13px;
}

}

</style>

</head>

<body>

<!-- OVERLAY -->

<div id="menu-overlay"></div>

<!-- HEADER -->

<header id="topo" style="display:none">

<a href="#" class="logo" onclick="location.reload()">
<img src="logo.png" alt="Logo Guga Energy">
<h2>GUGA <span>ENERGY</span></h2>
</a>

<button onclick="sair()" class="sair-btn">
Sair
</button>

</header>

<!-- LOGIN -->

<div class="login" id="login">

<div class="login-box">

<div class="logo">
<img src="logo.png" alt="Logo Guga Energy">
<h2>GUGA <span>ENERGY</span></h2>
</div>

<div class="login-sub">
Painel de Atendimentos
</div>

<div class="usuario-box">
<input id="usuario" placeholder="Usuário" autocomplete="username">
</div>

<div class="senha-box">
<input id="senha" type="password" placeholder="Senha" autocomplete="current-password">
<span class="ver-senha" onclick="verSenha()">👁</span>
</div>

<button onclick="entrar()" class="btn">
Entrar no Painel
</button>

<button onclick="location.reload()" class="btn">
Atualizar
</button>

<button onclick="voltarSite()" class="btn">
Voltar ao Site
</button>

</div>

</div>

<!-- PAINEL -->

<div class="painel" id="painel">

<div class="cards">

<div class="card">
<strong>Empresa</strong>
<div class="empresa-nome">GUGA <span>ENERGY</span></div>
<div class="empresa-desc">Soluções Elétricas</div>
</div>

<div class="card">
<strong>Região de Atendimento</strong>
<div class="empresa-desc">Distrito Federal</div>
</div>

</div>

<!-- BUSCA -->

<div class="busca-box">

<input 
type="text"
id="buscaCliente"
placeholder="🔎 Buscar cliente ou telefone"
>

</div>

<!-- DASHBOARD -->

<div class="dashboard">

<div class="dash-card">
<span>Pendentes</span>
<strong id="pendentes">0</strong>
</div>

<div class="dash-card">
<span>Concluídos</span>
<strong id="concluidos">0</strong>
</div>

<div class="dash-card">
<span>Arquivados</span>
<strong id="arquivados">0</strong>
</div>

<div class="dash-card">
<span>Hoje</span>
<strong id="hoje">0</strong>
</div>

</div>

<!-- CONTADOR -->

<div class="contador-atendimentos">

Atendimentos registrados:
<strong id="total">0</strong>

</div>

<!-- TABELA -->

<table>

<thead>
<tr>
<th>Cliente</th>
<th>Telefone</th>
<th>Região</th>
<th>Data</th>
<th>Status</th>
<th>Problema</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"
import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"

const firebaseConfig = {
apiKey: "AIzaSyDdP2-_Dr67CVhaNmgrs8x0JvTan2f9mNc",
authDomain: "guga-energy-agendamentos-778f1.firebaseapp.com",
projectId: "guga-energy-agendamentos-778f1",
storageBucket: "guga-energy-agendamentos-778f1.firebasestorage.app",
messagingSenderId: "384265745174",
appId: "1:384265745174:web:a9284d4036f4a787bf5637"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

window.db = db
window.getDocs = getDocs
window.collection = collection
window.deleteDoc = deleteDoc
window.updateDoc = updateDoc
window.doc = doc

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

/* LOGIN */

function entrar(){

let user=document.getElementById("usuario").value.trim().toLowerCase()
let pass=document.getElementById("senha").value.trim()

if(user==="guga" && pass==="Energy2024"){

localStorage.setItem("painelLogado","sim")

document.getElementById("login").style.display="none"
document.getElementById("painel").style.display="block"
document.getElementById("topo").style.display="flex"

setTimeout(carregar,200)

}else{

alert("Usuário ou senha incorretos.")

}

}

/* SAIR */

function sair(){

localStorage.removeItem("painelLogado")

document.getElementById("painel").style.display="none"
document.getElementById("topo").style.display="none"
document.getElementById("login").style.display="flex"
document.getElementById("usuario").value=""
document.getElementById("senha").value=""

}

/* CARREGAR DADOS */

async function carregar(){

if(typeof db === "undefined"){
setTimeout(carregar,500)
return
}

const tabela = document.getElementById("tabela")

let total = 0
let pendentes = 0
let concluidos = 0
let arquivados = 0

let hoje = new Date().toLocaleDateString()
let atendHoje = 0

let linhas = ""

try{

const snapshot = await getDocs(collection(db,"agendamentos"))

snapshot.forEach((documento)=>{

const dadosDoc = documento.data()
const id = documento.id

/* DATA HOJE */

if(dadosDoc.dataHora){

let data = dadosDoc.dataHora.split(" às ")[0]

if(data === hoje){
atendHoje++
}

}

/* TELEFONE LIMPO */

const telefoneLimpo = String(dadosDoc.telefone || "").replace(/\D/g,'')

const status = dadosDoc.status || "Pendente"

/* CONTADORES */

if(status === "Concluído"){
concluidos++
}else{
pendentes++
}

/* ARQUIVADOS */

if(dadosDoc.arquivado){

arquivados++

const trintaDias = 30 * 24 * 60 * 60 * 1000

if(Date.now() - dadosDoc.dataArquivado > trintaDias){
deleteDoc(doc(db,"agendamentos",id))
}

return
}

total++

/* LINHA TABELA */

linhas += `
<tr>

<td>${dadosDoc.nome || "-"}</td>
<td>${dadosDoc.telefone || "-"}</td>
<td>${dadosDoc.regiao || "-"}</td>
<td>${dadosDoc.dataHora || "-"}</td>
<td>${status}</td>
<td>${dadosDoc.problema || "-"}</td>

<td>

<div class="acoes">

<a class="btn"
href="https://wa.me/55${telefoneLimpo}"
target="_blank">
WhatsApp
</a>

<a class="btn"
href="tel:${telefoneLimpo}">
Ligar
</a>

<a class="btn"
href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((dadosDoc.regiao || '') + ' Brasilia DF')}"
target="_blank">
Mapa
</a>

<button class="btn"
onclick="gerarOrcamento('${dadosDoc.nome}','${dadosDoc.problema}')">
Orçamento
</button>

<button class="btn"
onclick="abrirAgenda('${dadosDoc.nome}','${telefoneLimpo}','${dadosDoc.regiao}','${dadosDoc.problema}','${dadosDoc.dataHora}')">
Agenda
</button>

<button class="btn verde"
onclick="concluir('${id}')">
Concluir
</button>

<button class="btn vermelho"
onclick="arquivar('${id}')">
Arquivar
</button>

</div>

</td>

</tr>
`

})

/* ATUALIZA TABELA */

tabela.innerHTML = linhas

/* DASHBOARD */

document.getElementById("total").innerText = total
document.getElementById("pendentes").innerText = pendentes
document.getElementById("concluidos").innerText = concluidos
document.getElementById("arquivados").innerText = arquivados
document.getElementById("hoje").innerText = atendHoje

}catch(e){

alert("Erro ao carregar agendamentos.")
console.log(e)

}

}

/* GOOGLE AGENDA */

function abrirAgenda(nome, telefone, regiao, problema, dataHora){

if(!dataHora) return

let partes = dataHora.split(" às ")

let data = partes[0]
let hora = partes[1]

let [dia,mes,ano] = data.split("/")

let inicio = `${ano}-${mes}-${dia}T${hora}`

let fim = new Date(inicio)
fim.setHours(fim.getHours()+1)

let inicioFormatado = inicio.replace(/[-:]/g,"")
let fimFormatado = fim.toISOString().replace(/[-:]/g,"").split(".")[0]

let agenda =
"https://calendar.google.com/calendar/render?action=TEMPLATE"
+ "&text=Visita Técnica - " + nome
+ "&details=Cliente: " + nome + " | Telefone: " + telefone + " | Problema: " + problema
+ "&location=" + regiao
+ "&dates=" + inicioFormatado + "/" + fimFormatado

window.open(agenda)

}

function voltarSite(){
window.location.href="index.html"
}

/* VER SENHA */

function verSenha(){

let campo = document.getElementById("senha")

campo.type = campo.type === "password" ? "text" : "password"

}

/* CONCLUIR */

async function concluir(id){

if(!id) return

try{

await updateDoc(doc(db,"agendamentos",id),{
status:"Concluído"
})

carregar()

}catch(e){

console.log(e)
alert("Erro ao concluir atendimento.")

}

}

/* GERAR ORÇAMENTO */

function gerarOrcamento(cliente, problema){

const { jsPDF } = window.jspdf

let doc = new jsPDF()

let data = new Date().toLocaleDateString()

cliente = cliente || "Cliente"
problema = problema || "Não informado"

let textoProblema = doc.splitTextToSize(problema,170)

doc.setFont("helvetica","bold")
doc.setFontSize(18)
doc.text("GUGA ENERGY",20,20)

doc.setFontSize(12)
doc.setFont("helvetica","normal")

doc.text(`Data: ${data}`,20,35)
doc.text(`Cliente: ${cliente}`,20,45)

doc.text("Serviço solicitado:",20,60)

doc.setFont("helvetica","italic")
doc.text(textoProblema,20,70)

doc.setFont("helvetica","normal")

doc.text("O orçamento detalhado será apresentado após análise técnica no local.",20,100,{maxWidth:170})

doc.text("Execução conforme NBR 5410",20,120)
doc.text("Profissional habilitado NR10",20,130)
doc.text("Garantia do serviço.",20,140)

doc.save(`orcamento-${cliente.replace(/[^a-z0-9]/gi,"_")}.pdf`)

}

/* ARQUIVAR */

async function arquivar(id){

if(!confirm("Mover atendimento para lixeira por 30 dias?")) return

try{

await updateDoc(doc(db,"agendamentos",id),{
arquivado:true,
dataArquivado:Date.now()
})

carregar()

}catch(e){

alert("Erro ao arquivar atendimento.")
console.log(e)

}

}

/* BUSCA */

let campoBusca = document.getElementById("buscaCliente")

if(campoBusca){

campoBusca.addEventListener("keyup", function(){

let filtro = this.value.toLowerCase()

let linhas = document.querySelectorAll("#tabela tr")

linhas.forEach(function(linha){

let texto = linha.innerText.toLowerCase()

linha.style.display = texto.includes(filtro) ? "" : "none"

})

})

}

/* AUTO LOGIN */

if(localStorage.getItem("painelLogado") === "sim"){

document.getElementById("login").style.display="none"
document.getElementById("painel").style.display="block"
document.getElementById("topo").style.display="flex"

setTimeout(carregar,200)

}

</script>

</body>
</html>
