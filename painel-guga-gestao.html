<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Guga Energy</title>

<style>

/* RESET */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

a{
text-decoration:none;
color:inherit;
}

/* BASE */

body{
font-family:Arial, Helvetica, sans-serif;
background:#020202;
color:#fff;
padding-top:70px;
min-height:100vh;
line-height:1.4;
}

/* HEADER */

header{
background:#000;
height:70px;
padding:0 20px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:3px solid #FFD000;
position:fixed;
top:0;
left:0;
width:100%;
z-index:3000;
}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:40px;
}

.logo h2{
font-size:20px;
}

.logo span{
color:#FFD000;
}

/* BOTÃO SAIR */

.sair-btn{
background:#FFD000;
color:#000;
border:none;
border-radius:6px;
padding:10px 14px;
font-weight:bold;
font-size:14px;
cursor:pointer;
}

/* BOTÕES */

.btn{
display:flex;
align-items:center;
justify-content:center;
background:#FFD000;
color:#000;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
padding:10px 12px;
font-size:14px;
min-height:40px;
transition:.2s;
}

.btn:hover{
opacity:.9;
}

.btn.verde{
background:#28a745;
color:#fff;
}

.btn.vermelho{
background:#dc3545;
color:#fff;
}

/* LOGIN */

.login{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
padding:20px;
}

.login-box{
background:#0a0a0a;
padding:36px;
border-radius:12px;
width:360px;
max-width:95%;
text-align:center;
border-top:3px solid #FFD000;
box-shadow:0 8px 30px rgba(0,0,0,0.8);
}

.login-box input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:6px;
border:1px solid #1f1f1f;
background:#111;
color:#fff;
font-size:14px;
}

.login-sub{
font-size:14px;
color:#9c9c9c;
margin-bottom:20px;
}

/* PAINEL */

.painel{
display:none;
padding:30px 20px;
max-width:1500px;
margin:auto;
}

/* CARDS SUPERIORES */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:16px;
margin-bottom:22px;
}

.card{
background:#151515;
padding:20px;
border-left:4px solid #FFD000;
border-radius:10px;
font-size:15px;
}

/* BUSCA */

.busca-box{
margin-bottom:20px;
}

#buscaCliente{
width:100%;
padding:14px;
border-radius:8px;
border:none;
background:#111;
color:#fff;
font-size:15px;
}

/* DASHBOARD */

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:14px;
margin-bottom:20px;
}

.dash-card{
background:#111;
padding:16px;
border-left:4px solid #FFD000;
border-radius:8px;
text-align:center;
}

.dash-card span{
font-size:13px;
color:#aaa;
}

.dash-card strong{
display:block;
font-size:22px;
color:#FFD000;
margin-top:5px;
}

/* CONTADOR */

.contador-atendimentos{
margin:20px 0;
background:#111;
padding:14px;
border-left:4px solid #FFD000;
border-radius:6px;
font-size:15px;
}

/* LISTA CLIENTES */

.clientes{
display:flex;
flex-direction:column;
gap:16px;
}

/* CARD CLIENTE */

.cliente-card{
background:#111;
border-left:4px solid #FFD000;
border-radius:10px;
overflow:hidden;
}

/* TOPO CARD */

.cliente-topo{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
cursor:pointer;
background:#151515;
}

.cliente-nome{
font-weight:bold;
font-size:16px;
}

.cliente-status{
font-size:12px;
background:#333;
padding:5px 10px;
border-radius:6px;
}

/* INFO CARD */

.cliente-info{
display:none;
padding:16px;
border-top:1px solid #333;
}

.cliente-info p{
margin-bottom:8px;
font-size:15px;
}

/* AÇÕES */

.acoes{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

/* RESPONSIVO */

@media(max-width:700px){

.painel{
padding:20px 14px;
}

.logo h2{
font-size:17px;
}

.dashboard{
grid-template-columns:1fr 1fr;
}

.cards{
grid-template-columns:1fr;
}

.btn{
font-size:13px;
min-height:36px;
}

.cliente-nome{
font-size:15px;
}

}

/* ÁREA DOS BOTÕES DO LOGIN */

.login-box .btn{
width:100%;
margin-top:12px;
min-height:44px;
font-size:15px;
}

.login-box .btn:first-of-type{
margin-top:22px;
}

/* CAMPO SENHA */

.senha-box{
position:relative;
}

/* ÍCONE OLHO */

.ver-senha{
position:absolute;
right:14px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#FFD000;
font-size:18px;
}

/* AJUSTE INPUT SENHA */

.senha-box input{
padding-right:45px;
}

</style>

</head>

<body>

<!-- OVERLAY -->

<div id="menu-overlay"></div>

<!-- HEADER -->

<header id="topo" style="display:none">

<a href="#" class="logo" onclick="location.reload()">
<img src="logo.png" alt="Logo Guga Energy">
<h2>GUGA <span>ENERGY</span></h2>
</a>

<button onclick="sair()" class="sair-btn">
Sair
</button>

</header>

<!-- LOGIN -->

<div class="login" id="login">

<div class="login-box">

<div class="logo">
<img src="logo.png" alt="Logo Guga Energy">
<h2>GUGA <span>ENERGY</span></h2>
</div>

<div class="login-sub">
Painel de Atendimentos
</div>

<div class="usuario-box">
<input id="usuario" placeholder="Usuário" autocomplete="username">
</div>

<div class="senha-box">
<input id="senha" type="password" placeholder="Senha" autocomplete="current-password">
<span class="ver-senha" onclick="verSenha()">👁</span>
</div>

<button onclick="entrar()" class="btn">
Entrar no Painel
</button>

<button onclick="location.reload()" class="btn">
Atualizar
</button>

<button onclick="voltarSite()" class="btn">
Voltar ao Site
</button>

</div>

</div>

<!-- PAINEL -->

<div class="painel" id="painel">

<!-- CARDS SUPERIORES -->

<div class="cards">

<div class="card">
<strong>Empresa</strong>
<div class="empresa-nome">GUGA <span>ENERGY</span></div>
<div class="empresa-desc">Soluções Elétricas</div>
</div>

<div class="card">
<strong>Região de Atendimento</strong>
<div class="empresa-desc">Distrito Federal</div>
</div>

</div>

<!-- BUSCA -->

<div class="busca-box">

<input 
type="text"
id="buscaCliente"
placeholder="🔎 Buscar cliente ou telefone"
>

</div>

<!-- DASHBOARD -->

<div class="dashboard">

<div class="dash-card">
<span>Pendentes</span>
<strong id="pendentes">0</strong>
</div>

<div class="dash-card">
<span>Concluídos</span>
<strong id="concluidos">0</strong>
</div>

<div class="dash-card">
<span>Arquivados</span>
<strong id="arquivados">0</strong>
</div>

<div class="dash-card">
<span>Hoje</span>
<strong id="hoje">0</strong>
</div>

</div>

<!-- CONTADOR -->

<div class="contador-atendimentos">

Atendimentos registrados:
<strong id="total">0</strong>

</div>

<!-- LISTA DE CLIENTES (CARDS) -->

<div id="listaClientes" class="clientes"></div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"
import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"

const firebaseConfig = {
apiKey: "AIzaSyDdP2-_Dr67CVhaNmgrs8x0JvTan2f9mNc",
authDomain: "guga-energy-agendamentos-778f1.firebaseapp.com",
projectId: "guga-energy-agendamentos-778f1",
storageBucket: "guga-energy-agendamentos-778f1.firebasestorage.app",
messagingSenderId: "384265745174",
appId: "1:384265745174:web:a9284d4036f4a787bf5637"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

window.db = db
window.getDocs = getDocs
window.collection = collection
window.deleteDoc = deleteDoc
window.updateDoc = updateDoc
window.doc = doc

</script>

<!-- SISTEMA -->

<script>

/* LOGIN */

function entrar(){

let user=document.getElementById("usuario").value.trim().toLowerCase()
let pass=document.getElementById("senha").value.trim()

if(user==="guga" && pass==="Energy2024"){

localStorage.setItem("painelLogado","sim")

document.getElementById("login").style.display="none"
document.getElementById("painel").style.display="block"
document.getElementById("topo").style.display="flex"

setTimeout(carregar,200)

}else{

alert("Usuário ou senha incorretos.")

}

}

/* SAIR */

function sair(){

localStorage.removeItem("painelLogado")

document.getElementById("painel").style.display="none"
document.getElementById("topo").style.display="none"
document.getElementById("login").style.display="flex"

}

/* CARREGAR DADOS */

async function carregar(){

if(typeof db === "undefined"){
setTimeout(carregar,500)
return
}

const lista = document.getElementById("listaClientes")

let total = 0
let pendentes = 0
let concluidos = 0
let arquivados = 0

let hoje = new Date().toLocaleDateString()
let atendHoje = 0

let cards = ""

try{

const snapshot = await getDocs(collection(db,"agendamentos"))

snapshot.forEach((documento)=>{

const dadosDoc = documento.data()
const id = documento.id

if(dadosDoc.dataHora){

let data = dadosDoc.dataHora.split(" às ")[0]

if(data === hoje){
atendHoje++
}

}

const telefoneLimpo = String(dadosDoc.telefone || "").replace(/\D/g,'')
const status = dadosDoc.status || "Pendente"

if(status === "Concluído"){
concluidos++
}else{
pendentes++
}

if(dadosDoc.arquivado){

arquivados++

const trintaDias = 30 * 24 * 60 * 60 * 1000

if(Date.now() - dadosDoc.dataArquivado > trintaDias){
deleteDoc(doc(db,"agendamentos",id))
}

return
}

total++

cards += `

<div class="cliente-card">

<div class="cliente-topo" onclick="toggleCard(this.parentElement)">

<div class="cliente-nome">
${dadosDoc.nome || "-"}
</div>

<div class="cliente-status">
${status}
</div>

</div>

<div class="cliente-info">

<p><strong>Telefone:</strong> ${dadosDoc.telefone || "-"}</p>
<p><strong>Região:</strong> ${dadosDoc.regiao || "-"}</p>
<p><strong>Data:</strong> ${dadosDoc.dataHora || "-"}</p>
<p><strong>Problema:</strong> ${dadosDoc.problema || "-"}</p>

<div class="acoes">

<a class="btn" href="https://wa.me/55${telefoneLimpo}" target="_blank">
WhatsApp
</a>

<a class="btn" href="tel:${telefoneLimpo}">
Ligar
</a>

<a class="btn"
href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((dadosDoc.regiao || '') + ' Brasilia DF')}"
target="_blank">
Mapa
</a>

<button class="btn"
onclick="abrirAgenda('${dadosDoc.nome}','${telefoneLimpo}','${dadosDoc.regiao}','${dadosDoc.problema}','${dadosDoc.dataHora}')">
Agenda
</button>

<button class="btn verde"
onclick="concluir('${id}')">
Concluir
</button>

<button class="btn vermelho"
onclick="arquivar('${id}')">
Arquivar
</button>

</div>

</div>

</div>

`

})

lista.innerHTML = cards

document.getElementById("total").innerText = total
document.getElementById("pendentes").innerText = pendentes
document.getElementById("concluidos").innerText = concluidos
document.getElementById("arquivados").innerText = arquivados
document.getElementById("hoje").innerText = atendHoje

}catch(e){

alert("Erro ao carregar agendamentos.")
console.log(e)

}

}

/* ABRIR CARD */

function toggleCard(card){

let info = card.querySelector(".cliente-info")

if(info.style.display === "block"){
info.style.display = "none"
}else{
info.style.display = "block"
}

}

/* CONCLUIR */

async function concluir(id){

await updateDoc(doc(db,"agendamentos",id),{
status:"Concluído"
})

carregar()

}

/* ARQUIVAR */

async function arquivar(id){

if(!confirm("Mover atendimento para lixeira por 30 dias?")) return

await updateDoc(doc(db,"agendamentos",id),{
arquivado:true,
dataArquivado:Date.now()
})

carregar()

}

/* BUSCA */

document.getElementById("buscaCliente").addEventListener("keyup", function(){

let filtro = this.value.toLowerCase()

let cards = document.querySelectorAll(".cliente-card")

cards.forEach(function(card){

let texto = card.innerText.toLowerCase()

card.style.display = texto.includes(filtro) ? "" : "none"

})

})

/* AUTO LOGIN */

if(localStorage.getItem("painelLogado") === "sim"){

document.getElementById("login").style.display="none"
document.getElementById("painel").style.display="block"
document.getElementById("topo").style.display="flex"

setTimeout(carregar,200)

}

/* MOSTRAR / OCULTAR SENHA */

function verSenha(){

let campo = document.getElementById("senha")

if(campo.type === "password"){

campo.type = "text"

}else{

campo.type = "password"

}

}

</script>

</body>
</html>
