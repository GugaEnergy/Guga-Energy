<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Guga Energy</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020202;
color:white;
}

/* TOPO */

.topo{
position:sticky;
top:0;
z-index:999;
background:#000;
border-bottom:3px solid #FFD000;
display:none;
align-items:center;
justify-content:space-between;
padding:12px 20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:18px;
font-weight:bold;
color:#FFD000;
}

.logo img{
height:40px;
width:auto;
display:block;
}

.logo span{
color:white;
}

.menu{
display:flex;
gap:20px;
align-items:center;
}

.menu a{
color:white;
text-decoration:none;
font-size:14px;
transition:0.2s;
}

.menu a:hover{
color:#FFD000;
}

#menu-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:5000;
}

#menu-overlay.active{
opacity:1;
pointer-events:auto;
}

.status{
background:#FFD000;
color:black;
padding:6px 12px;
border-radius:4px;
font-weight:bold;
}

.btn{
background:#FFD000;
padding:8px 12px;
color:black;
border:none;
border-radius:4px;
font-weight:bold;
cursor:pointer;
font-size:13px;
min-width:90px;
text-align:center;
display:inline-block;
}

.btn.verde{
background:#28a745;
color:white;
}

.btn.vermelho{
background:#dc3545;
color:white;
}

.acoes{
display:flex;
gap:6px;
flex-wrap:wrap;
}

/* LOGIN AREA */

.login{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
width:100%;
background:#020202;
}

/* CAIXA LOGIN */

.login-box{
background:rgba(8,8,8,0.92);
padding:45px;
border-radius:12px;
width:340px;
max-width:90%;
text-align:center;
border:1px solid #1a1a1a;
border-top:3px solid #FFD000;
box-shadow:0 10px 40px rgba(0,0,0,0.9);
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
animation:fade 0.6s ease;
}

/* LOGO */

.login-box .logo img{
width:90px;
height:auto;
}

/* SUBTITULO */

.login-sub{
font-size:13px;
color:#9c9c9c;
margin-bottom:20px;
}

/* INPUTS */

.login-box .logo{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:5px;
border:1px solid #1f1f1f;
background:#111;
color:white;
outline:none;
font-size:14px;
transition:0.2s;
}

.login-box input:focus{
border:1px solid #FFD000;
background:#151515;
}

/* BOTÕES */

.login-box button{
width:100%;
padding:12px;
margin-top:10px;
background:#FFD000;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.login-box button:hover{
background:#ffea00;
transform:translateY(-2px);
box-shadow:0 4px 10px rgba(255,208,0,0.2);
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* PAINEL */

.painel{
display:none;
padding:30px;
max-width:1200px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#151515;
padding:25px;
border-left:4px solid #FFD000;
border-radius:6px;
font-size:15px;
line-height:1.6;
}

.card strong{
color:#FFD000;
font-size:16px;
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
background:#111;
border-radius:6px;
overflow:hidden;
}

th{
background:#000;
color:#FFD000;
font-weight:600;
}

th,td{
padding:14px;
border-bottom:1px solid #333;
font-size:14px;
text-align:left;
}

/* MAPA */

#mapa{
height:420px;
margin-top:30px;
border-radius:8px;
border:2px solid #FFD000;
}

@media(max-width:900px){

.cards{
grid-template-columns:1fr;
}

table{
display:block;
overflow-x:auto;
white-space:nowrap;
}

}

.usuario-box{
position:relative;
width:90%;
left: 1%;
}

.senha-box{
position:relative;
width:90%;
left: 1%;
}

.senha-box input{
width:100%;
padding:12px;
margin:center 0;
border-radius:5px;
border:1px solid #1f1f1f;
background:#111;
color:white;
outline:none;
}

.ver-senha{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#FFD000;
font-size:18px;
}

.login-box{
width:340px;
max-width:92%;
}

</style>

</head>

<body>

<!-- aqui vem sua lista de agendamentos -->

<script>
function sair(){
localStorage.removeItem("adminLogado")
window.location.href="/"
}
</script>

<div id="menu-overlay"></div>

<!-- TOPO -->

<div class="topo" id="topo">

<div class="logo">
<img src="logo.png" alt="Guga Energy">
<span>Guga Energy</span>
</div>

<div class="menu">

<a href="#">Painel</a>
<a href="index.html">Site</a>

<div class="status">
Atendimentos: <span id="total">0</span>
</div>

<button onclick="sair()" class="btn">Sair</button>

</div>

</div>

<!-- LOGIN -->

<div class="login" id="login">

<div class="login-box">

<div class="logo">
<img src="logo.png" alt="Guga Energy">
<span>Guga Energy</span>
</div>

<div class="login-sub">
Painel de Atendimentos
</div>

<div class="usuario-box">
<input id="usuario" placeholder="Usuário">
</div>
<div class="senha-box">
<input id="senha" type="password" placeholder="Senha">
<span onclick="verSenha()" class="ver-senha">👁</span>
</div>

<button onclick="carregar()" class="btn">Atualizar</button>
<button onclick="entrar()" class="btn">Entrar no Painel</button>
<button onclick="voltarSite()" class="btn">Sair</button>

</div>

</div>

<!-- PAINEL -->

<div class="painel" id="painel">

<div class="cards">

<div class="card">
<strong>Empresa</strong><br>
Guga Energy<br>
Soluções Elétricas
</div>

<div class="card">
<strong>Região</strong><br>
Distrito Federal
</div>

</div>

<table>

<thead>
<tr>
<th>Cliente</th>
<th>Telefone</th>
<th>Região</th>
<th>Data</th>
<th>Status</th>
<th>Problema</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

<div id="mapa"></div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"
import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc } from
"https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"
window.deleteDoc = deleteDoc
window.updateDoc = updateDoc
window.doc = doc

const firebaseConfig = {

apiKey: "AIzaSyDdP2-_Dr67CVhaNmgrs8x0JvTan2f9mNc",
authDomain: "guga-energy-agendamentos-778f1.firebaseapp.com",
projectId: "guga-energy-agendamentos-778f1",
storageBucket: "guga-energy-agendamentos-778f1.firebasestorage.app",
messagingSenderId: "384265745174",
appId: "1:384265745174:web:a9284d4036f4a787bf5637"

}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

window.db = db
window.getDocs = getDocs
window.collection = collection

</script>

<!-- GOOGLE MAPS -->

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBDSyS6fBp_JgsBdtCTaDuBZzkfyzivFnQ&callback=iniciarMapa">
</script>

<script>

const coordenadas = {

"Plano Piloto": {lat:-15.793889,lng:-47.882778},
"Asa Norte": {lat:-15.758889,lng:-47.882222},
"Asa Sul": {lat:-15.805833,lng:-47.893333},

"Lago Norte": {lat:-15.716667,lng:-47.85},
"Lago Sul": {lat:-15.833333,lng:-47.85},

"Cruzeiro": {lat:-15.783889,lng:-47.939722},
"Sudoeste": {lat:-15.793611,lng:-47.925556},
"Octogonal": {lat:-15.795833,lng:-47.930278},

"Guará": {lat:-15.817778,lng:-47.983056},

"Águas Claras": {lat:-15.835556,lng:-48.037778},
"Vicente Pires": {lat:-15.812778,lng:-48.051944},
"Taguatinga": {lat:-15.835556,lng:-48.056389},

"Samambaia": {lat:-15.865833,lng:-48.072778},
"Recanto das Emas": {lat:-15.902778,lng:-48.061944},

"Ceilândia": {lat:-15.821111,lng:-48.106944},

"Riacho Fundo": {lat:-15.883333,lng:-48.016667},
"Riacho Fundo II": {lat:-15.883611,lng:-48.029444},

"Candangolândia": {lat:-15.865833,lng:-47.965833},
"Núcleo Bandeirante": {lat:-15.871944,lng:-47.967778},
"Park Way": {lat:-15.873611,lng:-47.921667},

"Santa Maria": {lat:-16.015278,lng:-48.015278},
"Gama": {lat:-16.0225,lng:-48.061111},

"Sobradinho": {lat:-15.650833,lng:-47.783889},
"Sobradinho II": {lat:-15.646944,lng:-47.794167},

"Paranoá": {lat:-15.775278,lng:-47.775556},
"Itapoã": {lat:-15.749722,lng:-47.756944},

"Planaltina-DF": {lat:-15.6175,lng:-47.648333},
"Arapoanga": {lat:-15.608611,lng:-47.658333},

"Fercal": {lat:-15.580556,lng:-47.861944}

}

/* LOGIN */

function entrar(){

let user=document.getElementById("usuario").value.trim().toLowerCase()
let pass=document.getElementById("senha").value.trim()

if(user==="guga" && pass==="Energy2024"){

localStorage.setItem("painelLogado","sim")

document.getElementById("login").style.display="none"
document.getElementById("painel").style.display="block"
document.getElementById("topo").style.display="flex"

setTimeout(carregar,200)

}else{

alert("Usuário ou senha incorretos.")

}

}

/* SAIR */

function sair(){

localStorage.removeItem("painelLogado")

document.getElementById("painel").style.display="none"
document.getElementById("topo").style.display="none"
document.getElementById("login").style.display="flex"
document.getElementById("usuario").value=""
document.getElementById("senha").value=""

}

/* CARREGAR DADOS */

async function carregar(){

if(typeof google === "undefined") return

let tabela=document.getElementById("tabela")
tabela.innerHTML=""

let total=0

let mapaContainer = document.getElementById("mapa")

if(!mapaContainer) return

let mapa = new google.maps.Map(mapaContainer,{
zoom:10,
center:{lat:-15.78,lng:-47.93},
mapTypeId:"roadmap",
gestureHandling:"auto"
})

mapa.setCenter({lat:-15.78,lng:-47.93})

let bounds = new google.maps.LatLngBounds()

try{

let snapshot=await getDocs(collection(db,"agendamentos"))

snapshot.forEach(documento=>{

let dados=documento.data()
let id=documento.id

total++

let telefoneLimpo = dados.telefone.replace(/\D/g,'')

let status = dados.status || "Pendente"

let linha=`

<tr>

<td>${dados.nome}</td>
<td>${dados.telefone}</td>
<td>${dados.regiao}</td>
<td>${dados.dataHora}</td>
<td>${status}</td>
<td>${dados.problema}</td>

<td>

<div class="acoes">

<a class="btn"
href="https://wa.me/55${telefoneLimpo}"
target="_blank">
WhatsApp
</a>

<button class="btn"
onclick="abrirAgenda('${dados.nome}','${telefoneLimpo}','${dados.regiao}','${dados.problema}','${dados.dataHora}')">
Agenda
</button>

<button class="btn verde"
onclick="concluir('${id}')">
Concluir
</button>

<button class="btn vermelho"
onclick="excluir('${id}')">
Excluir

</button>

</div>

</td>

</tr>
`

tabela.innerHTML += linha

let pos = coordenadas[dados.regiao] || {lat:-15.78,lng:-47.93}

new google.maps.Marker({
position:pos,
map:mapa,
title:dados.regiao,
animation:google.maps.Animation.DROP,
icon:{
url:"https://maps.google.com/mapfiles/ms/icons/yellow-dot.png"
}
})

bounds.extend(pos)

})

if(!bounds.isEmpty()){
mapa.fitBounds(bounds)
}else{
mapa.setZoom(11)
}

document.getElementById("total").innerText = total

}catch(e){

alert("Erro ao carregar agendamentos.")
console.log(e)

}

}

/* GOOGLE AGENDA */

function abrirAgenda(nome, telefone, regiao, problema, dataHora){

let partes = dataHora.split(" às ")

let data = partes[0]
let hora = partes[1]

let inicio = data + "T" + hora

let fim = new Date(inicio)
fim.setHours(fim.getHours()+1)

let inicioFormatado = inicio.replace(/[-:]/g,"")
let fimFormatado = fim.toISOString().replace(/[-:]/g,"").split(".")[0]

let agenda = "https://calendar.google.com/calendar/render?action=TEMPLATE"
+ "&text=Visita Técnica - " + nome
+ "&details=Cliente: " + nome + " | Telefone: " + telefone + " | Problema: " + problema
+ "&location=" + regiao
+ "&dates=" + inicioFormatado + "/" + fimFormatado

window.open(agenda)

}

function voltarSite(){

window.location.href="index.html"

}

function verSenha(){

let campo = document.getElementById("senha")

if(campo.type === "password"){
campo.type = "text"
}else{
campo.type = "password"
}

}

async function concluir(id){

try{

await updateDoc(doc(db,"agendamentos",id),{
status:"Concluído"
})

carregar()

}catch(e){

alert("Erro ao concluir atendimento.")

}

}

function iniciarMapa(){

if(localStorage.getItem("painelLogado")==="sim"){

carregar()

}

}

window.addEventListener("load", function(){

if(localStorage.getItem("painelLogado")==="sim"){

document.getElementById("login").style.display="none"
document.getElementById("painel").style.display="block"
document.getElementById("topo").style.display="flex"

}

})

</script>

</body>
</html>
