<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Guga Energy</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020202;
color:white;
}

/* TOPO */

.topo{
position:sticky;
top:0;
z-index:999;
background:#000;
border-bottom:3px solid #FFD000;
display:none;
align-items:center;
justify-content:space-between;
padding:12px 20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:18px;
font-weight:bold;
color:#FFD000;
}

.logo img{
height:40px;
width:auto;
display:block;
}

.logo span{
color:white;
}

.menu{
display:flex;
gap:20px;
align-items:center;
}

.menu a{
color:white;
text-decoration:none;
font-size:14px;
transition:0.2s;
}

.menu a:hover{
color:#FFD000;
}

.status{
background:#FFD000;
color:black;
padding:6px 12px;
border-radius:4px;
font-weight:bold;
}

.btn{
background:#FFD000;
padding:6px 10px;
color:black;
border:none;
border-radius:4px;
font-weight:bold;
cursor:pointer;
}

/* LOGIN AREA */

.login{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
width:100%;
background:#020202;
}

/* CAIXA LOGIN */

.login-box{
background:rgba(8,8,8,0.92);
padding:45px;
border-radius:12px;
width:340px;
max-width:90%;
text-align:center;
border:1px solid #1a1a1a;
border-top:3px solid #FFD000;
box-shadow:0 10px 40px rgba(0,0,0,0.9);
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
animation:fade 0.6s ease;
}

/* LOGO */

.login-box .logo img{
width:90px;
height:auto;
}

/* SUBTITULO */

.login-sub{
font-size:13px;
color:#9c9c9c;
margin-bottom:20px;
}

/* INPUTS */

.login-box .logo{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:5px;
border:1px solid #1f1f1f;
background:#111;
color:white;
outline:none;
font-size:14px;
transition:0.2s;
}

.login-box input:focus{
border:1px solid #FFD000;
background:#151515;
}

/* BOTÕES */

.login-box button{
width:100%;
padding:12px;
margin-top:10px;
background:#FFD000;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.login-box button:hover{
background:#ffea00;
transform:translateY(-2px);
box-shadow:0 4px 10px rgba(255,208,0,0.2);
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* PAINEL */

.painel{
display:none;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#151515;
padding:20px;
border-left:4px solid #FFD000;
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

th{
background:#111;
color:#FFD000;
}

/* MAPA */

#mapa{
height:400px;
margin-top:20px;
border-radius:6px;
}

@media(max-width:900px){

.cards{
grid-template-columns:1fr;
}

table{
display:block;
overflow-x:auto;
white-space:nowrap;
}

}

.usuario-box{
position:relative;
width:90%;
left: 1%;
}

.senha-box{
position:relative;
width:90%;
left: 1%;
}

.senha-box input{
width:100%;
padding:12px;
margin:center 0;
border-radius:5px;
border:1px solid #1f1f1f;
background:#111;
color:white;
outline:none;
}

.ver-senha{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#FFD000;
font-size:18px;
}

.login-box{
width:340px;
max-width:92%;
}

</style>

</head>

<body>

<!-- TOPO -->

<div class="topo" id="topo">

<div class="logo">
<img src="logo.png" alt="Guga Energy">
<span>Guga Energy</span>
</div>

<div class="menu">

<a href="#">Painel</a>
<a href="index.html">Site</a>

<div class="status">
Atendimentos: <span id="total">0</span>
</div>

<button onclick="sair()" class="btn">Sair</button>

</div>

</div>

<!-- LOGIN -->

<div class="login" id="login">

<div class="login-box">

<div class="logo">
<img src="logo.png" alt="Guga Energy">
<span>Guga Energy</span>
</div>

<div class="login-sub">
Painel de Atendimentos
</div>

<div class="usuario-box">
<input id="usuario" placeholder="Usuário">
</div>
<div class="senha-box">
<input id="senha" type="password" placeholder="Senha">
<span onclick="verSenha()" class="ver-senha">👁</span>
</div>

<button onclick="carregar()" class="btn">Atualizar</button>
<button onclick="entrar()" class="btn">Entrar no Painel</button>
<button onclick="voltarSite()" class="btn">Sair</button>

</div>

</div>

<!-- PAINEL -->

<div class="painel" id="painel">

<div class="cards">

<div class="card">
<strong>Empresa</strong><br>
Guga Energy<br>
Soluções Elétricas
</div>

<div class="card">
<strong>Região</strong><br>
Distrito Federal
</div>

<div class="card">
<strong>Normas</strong><br>
NBR 5410<br>
NR10
</div>

</div>

<table>

<thead>
<tr>
<th>Cliente</th>
<th>Telefone</th>
<th>Região</th>
<th>Data</th>
<th>Problema</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

<div id="mapa"></div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"

const firebaseConfig = {

apiKey: "AIzaSyDdP2-_Dr67CVhaNmgrs8x0JvTan2f9mNc",
authDomain: "guga-energy-agendamentos-778f1.firebaseapp.com",
projectId: "guga-energy-agendamentos-778f1",
storageBucket: "guga-energy-agendamentos-778f1.firebasestorage.app",
messagingSenderId: "384265745174",
appId: "1:384265745174:web:a9284d4036f4a787bf5637"

}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

window.db = db
window.getDocs = getDocs
window.collection = collection

</script>

<!-- GOOGLE MAPS -->

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBDSyS6fBp_JgsBdtCTaDuBZzkfyzivFnQ"></script>

<script>

const coordenadas = {

"Planaltina-DF": {lat:-15.617,lng:-47.648},
"Asa Norte": {lat:-15.760,lng:-47.880},
"Plano Piloto": {lat:-15.794,lng:-47.882},
"Cruzeiro": {lat:-15.785,lng:-47.940},
"Taguatinga": {lat:-15.835,lng:-48.056},
"Águas Claras": {lat:-15.832,lng:-48.040},
"Ceilândia": {lat:-15.821,lng:-48.107},
"Samambaia": {lat:-15.865,lng:-48.070},
"Gama": {lat:-16.022,lng:-48.061}

}

/* LOGIN */

function entrar(){

let user=document.getElementById("usuario").value.trim().toLowerCase()
let pass=document.getElementById("senha").value.trim()

if(user==="guga" && pass==="Energy2024"){

document.getElementById("login").style.display="none"
document.getElementById("painel").style.display="block"
document.getElementById("topo").style.display="flex"

carregar()

}else{

alert("Usuário ou senha incorretos.")

}

}

/* SAIR */

function sair(){

document.getElementById("painel").style.display="none"
document.getElementById("topo").style.display="none"
document.getElementById("login").style.display="flex"

document.getElementById("usuario").value=""
document.getElementById("senha").value=""

}

/* CARREGAR DADOS */

document.getElementById("mapa").innerHTML=""

async function carregar(){

let tabela=document.getElementById("tabela")
tabela.innerHTML=""

let total=0

let mapa = new google.maps.Map(document.getElementById("mapa"),{
zoom:10,
center:{lat:-15.78,lng:-47.93}
})

try{

let snapshot=await getDocs(collection(db,"agendamentos"))

snapshot.forEach(doc=>{

let dados=doc.data()

total++

let telefoneLimpo = dados.telefone.replace(/\D/g,'')

let linha=`

<tr>

<td>${dados.nome}</td>
<td>${dados.telefone}</td>
<td>${dados.regiao}</td>
<td>${dados.dataHora}</td>
<td>${dados.problema}</td>

<td>

<a class="btn"
href="https://wa.me/55${telefoneLimpo}"
target="_blank">
WhatsApp
</a>

<button class="btn"
onclick="abrirAgenda('${dados.nome}','${telefoneLimpo}','${dados.regiao}','${dados.problema}','${dados.dataHora}')">
Agenda
</button>

</td>

</tr>

`

tabela.innerHTML+=linha

let pos = coordenadas[dados.regiao] || {lat:-15.78,lng:-47.93}

new google.maps.Marker({
position:pos,
map:mapa,
title:dados.regiao
})

})

document.getElementById("total").innerText = total

}catch(e){

alert("Erro ao carregar agendamentos.")
console.log(e)

}

}

/* GOOGLE AGENDA */

function abrirAgenda(nome, telefone, regiao, problema, dataHora){

let partes = dataHora.split(" às ")

let data = partes[0]
let hora = partes[1]

let inicio = data + "T" + hora

let fim = new Date(inicio)
fim.setHours(fim.getHours()+1)

let inicioFormatado = inicio.replace(/[-:]/g,"")
let fimFormatado = fim.toISOString().replace(/[-:]/g,"").split(".")[0]

let agenda = "https://calendar.google.com/calendar/render?action=TEMPLATE"
+ "&text=Visita Técnica - " + nome
+ "&details=Cliente: " + nome + " | Telefone: " + telefone + " | Problema: " + problema
+ "&location=" + regiao
+ "&dates=" + inicioFormatado + "/" + fimFormatado

window.open(agenda)

}

function voltarSite(){

window.location.href="index.html"

}

function verSenha(){

let campo = document.getElementById("senha")

if(campo.type === "password"){
campo.type = "text"
}else{
campo.type = "password"
}

}

</script>

</body>
</html>
