<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Criar Conta | Guga Energy</title>

<style>

/* RESET */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* BODY */

body{
background:#020202;
color:#fff;
font-family:Arial, Helvetica, sans-serif;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

/* CONTAINER */

.container{
width:100%;
max-width:420px;
display:flex;
flex-direction:column;
align-items:center;
}

/* LOGO */

.logo{
width:260px;
margin-bottom:20px;
}

/* BOX */

.box{
background:#0a0a0a;
padding:35px;
border-radius:10px;
width:100%;
border-top:3px solid #FFD000;
box-shadow:0 8px 30px rgba(0,0,0,0.8);
text-align:center;
}

/* HEADER */

.box h2{
margin-bottom:5px;
}

.box p{
color:#aaa;
margin-bottom:20px;
}

/* INPUT */

input{
width:100%;
padding:12px;
border-radius:6px;
border:none;
background:#111;
color:#fff;
font-size:14px;
margin-bottom:12px;
}

/* BOTÃO */

button{
width:100%;
padding:12px;
background:#FFD000;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
opacity:.9;
}

/* VOLTAR */

.voltar{
margin-top:15px;
display:block;
color:#FFD000;
font-size:14px;
cursor:pointer;
}

/* LOADING */

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
width:50px;
height:50px;
border:5px solid #333;
border-top:5px solid #FFD000;
border-radius:50%;
animation:girar 1s linear infinite;
}

@keyframes girar{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="loading" id="loading">
<div class="spinner"></div>
</div>

<div class="container">

<img src="logo.png" class="logo">

<div class="box">

<h2>GUGA ENERGY</h2>
<p>Criar Conta</p>

<input id="nome" type="text" placeholder="Nome completo" autocomplete="name">

<input id="telefone"
type="tel"
placeholder="Telefone"
inputmode="numeric"
autocomplete="tel">

<input id="email"
type="email"
placeholder="Email"
autocomplete="email">

<input id="senha"
type="password"
placeholder="Senha"
autocomplete="new-password">

<button onclick="criarConta()">
Criar Conta
</button>

<span class="voltar" onclick="window.location.href='login.html'">
Voltar para login
</span>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js"

import {
getFirestore,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"

/* FIREBASE */

const firebaseConfig = {
apiKey:"AIzaSyDdP2-_Dr67CVhaNmgrs8x0JvTan2f9mNc",
authDomain:"guga-energy-agendamentos-778f1.firebaseapp.com",
projectId:"guga-energy-agendamentos-778f1"
}

const app = initializeApp(firebaseConfig)

const auth = getAuth(app)

const db = getFirestore(app)

/* CRIAR CONTA */

window.criarConta = async function(){

if(senha.length < 6){
alert("A senha precisa ter no mínimo 6 caracteres")
return
}

let nome = document.getElementById("nome").value.trim()
let telefone = document.getElementById("telefone").value.trim()
let email = document.getElementById("email").value.trim()
let senha = document.getElementById("senha").value.trim()

if(!nome || !telefone || !email || !senha){
alert("Preencha todos os campos")
return
}

/* MOSTRAR LOADING */

document.getElementById("loading").style.display="flex"

try{

const cred = await createUserWithEmailAndPassword(auth,email,senha)

await setDoc(doc(db,"usuarios",cred.user.uid),{
nome:nome,
telefone:telefone,
email:email,
tipo:"cliente",
criado:Date.now()
})

window.location.href="painel-cliente.html"

}catch(e){

document.getElementById("loading").style.display="none"
alert("Erro ao criar conta")

}

}

</script>

</body>
</html>
