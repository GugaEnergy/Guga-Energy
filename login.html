<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Login | Guga Energy</title>

<style>

/* RESET */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* BODY */

body{
background:#020202;
color:#fff;
font-family:Arial, Helvetica, sans-serif;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

/* CONTAINER */

.login-container{
display:flex;
flex-direction:column;
align-items:center;
width:100%;
max-width:420px;
}

/* LOGO */

.logo-area{
margin-bottom:20px;
}

.logo-login{
width:300px;
animation:logoEntrada .6s ease;
}

/* BOX */

.login-box{
background:#0a0a0a;
padding:35px;
border-radius:10px;
width:100%;
border-top:3px solid #FFD000;
box-shadow:0 8px 30px rgba(0,0,0,0.8);
text-align:center;
}

/* HEADER */

.login-header h2{
margin-bottom:5px;
}

.login-header p{
color:#aaa;
margin-bottom:20px;
}

/* FORM */

.login-form{
width:100%;
}

/* CAMPOS */

.campo-email,
.campo-senha{
margin-bottom:15px;
}

/* INPUT */

input{
width:100%;
padding:12px;
border-radius:6px;
border:none;
background:#111;
color:#fff;
font-size:14px;
}

/* SENHA */

.senha-box{
position:relative;
}

.ver-senha{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#FFD000;
font-size:18px;
}

/* BOTÃO */

button{
width:100%;
padding:12px;
background:#FFD000;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:6px;
margin-top:10px;
}

button:hover{
opacity:.9;
}

/* ANIMAÇÃO */

@keyframes logoEntrada{

from{
opacity:0;
transform:translateY(-300px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* BOTÃO GOOGLE */

.btn-google{
width:100%;
padding:12px;
background:#ffffff;
color:#000;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
font-size:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
transition:all .25s ease;
}

.btn-google img{
width:20px;
height:20px;
}

/* HOVER */

.btn-google:hover{
background:#ffffff; /* continua branco */
transform:translateY(-2px);
box-shadow:0 6px 16px rgba(0,0,0,0.6);
}

/* CLIQUE */

.btn-google:active{
transform:scale(.96);
}

.voltar{
position:fixed;
top:20px;
left:20px;
width:45px;
height:45px;
background:#FFD000;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
box-shadow:0 6px 18px rgba(0,0,0,.6);
transition:.25s;
z-index:9999;
}

.voltar:hover{
transform:scale(1.08);
box-shadow:0 8px 22px rgba(0,0,0,.8);
}

.voltar svg{
width:22px;
height:22px;
}

.ver-senha{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.ver-senha svg{
transition:.2s;
}

.ver-senha:hover svg{
transform:scale(1.1);
opacity:0.8;
}

</style>

</head>

<body>

<a href="index.html" class="voltar" aria-label="Voltar">
<svg viewBox="0 0 24 24" width="20" height="20">
<path d="M15 18l-6-6 6-6" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</a>

<div class="login-container">

<div class="logo-area">
<img src="logo-guga-energy.png" class="logo-login" alt="Logo Guga Energy">
</div>

<div class="login-box">

<div class="login-header">
<h2>GUGA ENERGY</h2>
<p>Login</p>
</div>

<form class="login-form" onsubmit="event.preventDefault(); entrar();">

<div class="campo-email">
<input id="usuario" type="email" placeholder="Email">
</div>

<div class="campo-senha">
<div class="senha-box">
<input id="senha" type="password" placeholder="Senha">
<span class="ver-senha" onclick="verSenha()">

<svg id="iconeOlho" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="#FFD000" stroke-width="2" viewBox="0 0 24 24">

<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"/>

</svg>

</span>
</div>
</div>

<div class="campo-botao">
<button onclick="entrar()">Entrar</button>
</div>

<div class="campo-botao">
<button type="button" onclick="loginGoogle()" class="btn-google">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
Entrar com Google
</button>
</div>

<div class="campo-botao">
<button type="button" onclick="window.location.href='criar-conta.html'" style="background:#444;color:#fff">
Criar Conta
</button>

</form>
</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"

import {
getAuth,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js"

import {
getFirestore,
doc,
getDoc,
setDoc,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"

/* CONFIG */

const firebaseConfig = {
apiKey:"AIzaSyDdP2-_Dr67CVhaNmgrs8x0JvTan2f9mNc",
authDomain:"guga-energy-agendamentos-778f1.firebaseapp.com",
projectId:"guga-energy-agendamentos-778f1"
}

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)

/* FUNÇÃO: VERIFICAR OU CRIAR USUÁRIO */

async function garantirUsuario(user){

const ref = doc(db,"usuarios",user.uid)
const snap = await getDoc(ref)

/* se já existe */
if(snap.exists()){
return snap.data()
}

/* verificar se já existe admin */
const todos = await getDocs(collection(db,"usuarios"))

let existeAdmin = false

todos.forEach(docItem=>{
if(docItem.data().tipo === "admin"){
existeAdmin = true
}
})

const tipo = existeAdmin ? "cliente" : "admin"

/* cria usuário */
await setDoc(ref,{
email:user.email || "",
nome:user.displayName || "",
tipo:tipo,
perfilCompleto:false,
criado:Date.now()
})

return { tipo, perfilCompleto:false }

}

/* LOGIN NORMAL */

window.entrar = async function(){

let email = document.getElementById("usuario").value.trim()
let senha = document.getElementById("senha").value.trim()

try{

const cred = await signInWithEmailAndPassword(auth,email,senha)
const user = cred.user

const dados = await garantirUsuario(user)

/* REDIRECIONAMENTO */

if(dados.tipo === "admin"){
window.location.href = "painel.html"
}else if(dados.perfilCompleto){
window.location.href = "cliente.html"
}else{
window.location.href = "completar-perfil.html"
}

}catch(e){

console.log(e)
alert("Usuário ou senha incorretos")

}

}

/* LOGIN GOOGLE */

const provider = new GoogleAuthProvider()

window.loginGoogle = async function(){

try{

const result = await signInWithPopup(auth, provider)
const user = result.user

const dados = await garantirUsuario(user)

/* REDIRECIONAMENTO */

if(dados.tipo === "admin"){
window.location.href = "painel.html"
}else if(dados.perfilCompleto){
window.location.href = "cliente.html"
}else{
window.location.href = "completar-perfil.html"
}

}catch(error){

console.log(error)
alert("Erro ao entrar com Google")

}

}

/* OLHO SENHA */

window.verSenha = function(){

let campo = document.getElementById("senha")
let icone = document.getElementById("iconeOlho")

if(campo.type === "password"){

campo.type = "text"

icone.innerHTML = `
<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"/>
<line x1="2" y1="2" x2="22" y2="22" stroke-width="1.5"/>
`

}else{

campo.type = "password"

icone.innerHTML = `
<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"/>
`

}

}

/* ENTER */

document.addEventListener("keydown",function(e){
if(e.key === "Enter"){
entrar()
}
})

</script>

</body>
</html>
